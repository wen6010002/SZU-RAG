# SZU-RAG MVP 全栈部署 Docker Compose
# 使用方法: docker compose up -d

services:
  # === 基础设施 ===
  mysql:
    image: mysql:8.0
    container_name: szu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-szu_rag_2024}
      MYSQL_DATABASE: szu_rag
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./szu-rag-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: szu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: szu-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://milvus-etcd:2379"
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: szu-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: szu-milvus
    platform: linux/amd64
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    entrypoint: ["/milvus/bin/milvus", "run", "standalone"]
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5

  # === 应用服务 ===
  backend:
    build: ./szu-rag-backend
    container_name: szu-backend
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/szu_rag?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-szu_rag_2024}
      SPRING_DATA_REDIS_HOST: redis
      MILVUS_HOST: milvus
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-placeholder}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-sk-placeholder}
    volumes:
      - backend-storage:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./szu-rag-frontend
    container_name: szu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  crawler:
    build: ./szu-rag-crawler
    container_name: szu-crawler
    ports:
      - "8090:8090"
    environment:
      RAGENT_BASE_URL: http://backend:8088
      MYSQL_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-szu_rag_2024}@mysql:3306/szu_rag
    volumes:
      - crawler-data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  backend-storage:
  crawler-data:
