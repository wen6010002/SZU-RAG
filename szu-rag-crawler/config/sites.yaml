# ==================== 公文通（非VSB） ====================

gwt:
  name: "公文通"
  base_url: "https://www1.szu.edu.cn"
  spider: "gwt"

  auth:
    type: "cas_sso"
    login_url: "https://authserver.szu.edu.cn/authserver/login"
    service_url: "https://www1.szu.edu.cn/"
    credentials_env:
      username: "SZU_USERNAME"
      password: "SZU_PASSWORD"
    cookie_persist: true
    captcha_fallback: "manual"

  columns:
    - name: "全部公文"
      url_pattern: "{base_url}/board/infolist.asp"
      column_id: ""
      enabled: true

  selectors:
    list:
      item: "table tr"
      title: "td:nth-child(4) a.fontcolor3"
      link: "td:nth-child(4) a[href^='view.asp']"
      date: "td:nth-child(6)"
    detail:
      title: "div.art-tit h3"
      content: "div#vsb_content"
      date: "span.art-date"
      attachments: "a[href*='download']"
    pagination:
      next_page: "a[href*='page=']"
      page_param: "page"

  crawl:
    mode: "incremental"
    incremental_pages: 5
    full_crawl_day_interval: 7
    download_delay: 1.5
    concurrent_requests: 1

  date_filter:
    enabled: true
    max_age_days: 180           # 公文保留半年
    field: "publish_date"

  push:
    enabled: true
    endpoint: "/api/v1/knowledge/documents/upload"
    with_attachments: true
