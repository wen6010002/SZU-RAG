# config/sites.yaml — 升级版

# ==================== VSB 站点 ====================

jwb:
  name: "教务处"
  base_url: "https://jwb.szu.edu.cn"
  spider: "vsb"

  columns:
    - name: "教务通知"
      url_pattern: "{base_url}/info/i_list.jsp?cata_id=11&curpage=1"
      column_id: "11"
      enabled: true
    - name: "考试安排"
      url_pattern: "{base_url}/info/i_list.jsp?cata_id=12&curpage=1"
      column_id: "12"
      enabled: true

  selectors:
    list:
      item: "ul.news_list li"
      link: "a[href*='/info/']"
      date: "span"
    detail:
      title: "div.art-tit h3"
      content: "div#vsb_content"
      date: "span.art-date"
      attachments: "a[href*='download']"

  crawl:
    mode: "incremental"
    incremental_pages: 3
    full_crawl_day_interval: 7
    download_delay: 1.0
    concurrent_requests: 2

  # ---------- 新增：日期过滤 ----------
  date_filter:
    enabled: true
    max_age_days: 180           # 教务通知保留半年
    field: "publish_date"

  push:
    enabled: true
    endpoint: "/api/v1/knowledge/documents/upload"
    with_attachments: true

